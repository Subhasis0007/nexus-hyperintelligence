_format_version: "3.0"
_transform: true

services:
  - name: nexus-api
    url: http://nexus-api:5000
    routes:
      - name: nexus-api-route
        paths:
          - /api
        strip_path: false
      - name: nexus-health-route
        paths:
          - /health
        strip_path: false
      - name: nexus-graphql-route
        paths:
          - /graphql
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 1000
          hour: 10000
          policy: local
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Tenant-ID
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600
