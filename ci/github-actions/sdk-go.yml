name: Go SDK

on:
  push:
    paths: [ 'sdks/go/**', 'wasm-agents/loader/**', 'ebpf/loader/**' ]
  pull_request:
    paths: [ 'sdks/go/**' ]

jobs:
  sdk-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Vet SDK
        working-directory: sdks/go
        run: go vet ./...
      - name: Build SDK
        working-directory: sdks/go
        run: go build ./...
      - name: Vet WASM loader
        working-directory: wasm-agents/loader
        run: go vet ./...
      - name: Build WASM loader
        working-directory: wasm-agents/loader
        run: go build -o /dev/null .
      - name: Vet eBPF loader
        working-directory: ebpf/loader
        run: go vet ./...
      - name: Build eBPF loader
        working-directory: ebpf/loader
        run: NEXUS_EBPF_SIMULATE=1 go build -o /dev/null .
