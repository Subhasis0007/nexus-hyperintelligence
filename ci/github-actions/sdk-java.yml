name: Java SDK

on:
  push:
    paths: [ 'sdks/java/**' ]
  pull_request:
    paths: [ 'sdks/java/**' ]

jobs:
  sdk-java:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['17', '21']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven
      - name: Build and Test
        working-directory: sdks/java
        run: mvn --batch-mode clean verify
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: nexus-sdk-java-${{ matrix.java-version }}
          path: sdks/java/target/*.jar
